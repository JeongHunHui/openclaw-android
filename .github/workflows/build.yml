name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (버전 계산용)

      - name: Set version
        id: version
        run: |
          # versionCode = 전체 커밋 수
          VERSION_CODE=$(git rev-list --count HEAD)
          # versionName = 1.{커밋수} 형식
          VERSION_NAME="1.${VERSION_CODE}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "🏷️ Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          BUILD_NUMBER: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/hunhui-bot-${{ env.VERSION_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunhui-bot-${{ env.VERSION_NAME }}
          path: app/build/outputs/apk/debug/hunhui-bot-${{ env.VERSION_NAME }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "훈희봇 v${{ env.VERSION_NAME }}"
          files: app/build/outputs/apk/debug/hunhui-bot-${{ env.VERSION_NAME }}.apk
          generate_release_notes: true
          body: |
            ## 훈희봇 v${{ env.VERSION_NAME }}
            
            자동 빌드 APK — 다운받아서 설치해봐! 🔮
            
            **설치 방법:**
            1. APK 파일 다운로드
            2. 갤럭시 설정 → 보안 → 출처를 알 수 없는 앱 허용
            3. 설치 후 실행 → Bot Token + Channel ID 입력
