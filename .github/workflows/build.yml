name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="1.${VERSION_CODE}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "🏷️ Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/hunhui-bot.jks
          echo "Keystore restored: $(wc -c < app/hunhui-bot.jks) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          BUILD_NUMBER: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          BOT_WEB_URL: ${{ secrets.BOT_WEB_URL }}
          BOT_SERVER_URL: ${{ secrets.BOT_SERVER_URL }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/hunhui-bot.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_STORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_KEY_PASS }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/hunhui-bot-${{ env.VERSION_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunhui-bot-${{ env.VERSION_NAME }}
          path: app/build/outputs/apk/release/hunhui-bot-${{ env.VERSION_NAME }}.apk
          retention-days: 90

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "훈희봇 v${{ env.VERSION_NAME }}"
          files: app/build/outputs/apk/release/hunhui-bot-${{ env.VERSION_NAME }}.apk
          generate_release_notes: true
          body: |
            ## 훈희봇 v${{ env.VERSION_NAME }}
            자동 빌드 APK 🔮
