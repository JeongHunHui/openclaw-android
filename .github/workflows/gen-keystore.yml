name: Generate Keystore
on: workflow_dispatch
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate keystore and output base64
        run: |
          keytool -genkey -v \
            -keystore hunhui-bot.jks \
            -alias hunhui \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=HunhuiBot,O=Hunhui,C=KR" \
            -storepass hunhuibot2024 -keypass hunhuibot2024 \
            -noprompt
          echo "=== BASE64 START ==="
          base64 -w 0 hunhui-bot.jks
          echo ""
          echo "=== BASE64 END ==="
